{% load static %}
<!DOCTYPE html>
<html lang="en">
	<!--begin::Head-->
	<head><base href="">
		<title>Login</title>
		<meta name="description" content="Juanitas Drapery System" />		
		<meta charset="utf-8" />				
		<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700" />		        
        <link href="{% static 'proyect/css/plugins.bundle.css' %}"rel="stylesheet" type="text/css" />		
		<link href="{% static 'proyect/css/style.bundle.css' %}" rel="stylesheet" type="text/css" />	
	</head>	
	<body id="kt_body" class="bg-body">	
		<div class="d-flex flex-column flex-root">			
			<div class="d-flex flex-column flex-column-fluid bgi-position-y-bottom position-x-center bgi-no-repeat bgi-size-contain bgi-attachment-fixed" 
				style="background-image: url(/static/proyect/images/login.webp); background-size:cover;">				
				<div class="d-flex flex-center flex-column flex-column-fluid p-10 pb-lg-20">					
					<div class="w-lg-500px bg-body rounded shadow-sm p-10 p-lg-15 mx-auto">
					
						<form class="form w-100" novalidate="novalidate" id="loginForm">
							{% csrf_token %}
							<div class="text-center mb-10">
								<!--begin::Logo-->
								<img alt="Logo" src="{% static 'proyect/images/logo.png' %}" class="h-40px h-lg-60px" />
								<!--end::Logo-->
								<br/><br/>								
								<h1 class="text-gray-400 mb-3">Sign In</h1>								
							</div>							
							<div class="fv-row mb-10">								
								<label class="form-label fs-6 fw-bolder text-dark">Email</label>								
								<input class="form-control form-control-lg form-control-solid" type="text" name="email" autocomplete="off" id="emailId" />
							</div>							
							<div class="fv-row mb-10">								
								<div class="d-flex flex-stack mb-2">									
									<label class="form-label fw-bolder text-dark fs-6 mb-0">Password</label>									
									<a href="#" class="link-primary fs-6 fw-bolder">Forgot Password ?</a>									
								</div>								
								<input class="form-control form-control-lg form-control-solid" type="password" name="password" autocomplete="off" />								
							</div>							
							<div class="text-center">								
								<button type="submit" id="buttonSubmit" class="btn btn-lg btn-primary w-100 mb-5">
									<span class="indicator-label">Continue</span>
									<span class="indicator-progress">Please wait...
									<span class="spinner-border spinner-border-sm align-middle ms-2"></span></span>
								</button>								
							</div>							
						</form>	
						<input type="hidden" id="url_validate" value="..{% url "validate_username" %}">
					</div>					
				</div>				
				<div class="d-flex flex-center flex-column-auto p-10">

				</div>				
			</div>			
		</div>
		                        
		<script src="{% static 'proyect/js/plugins.bundle.js' %}"></script>
		<script src="{% static 'proyect/js/scripts.bundle.js' %}"></script>
        <script src="{% static 'proyect/js/sign-in/general.js' %}"></script>
		<script src="{% static 'proyect/js/jquery.min.js' %}"></script>		
	</body>	
</html>
